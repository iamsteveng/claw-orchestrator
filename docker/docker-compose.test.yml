# docker-compose.test.yml
# ─────────────────────────────────────────────────────────────────────────────
# Full-stack test environment for Claw Orchestrator.
# Recommended usage: bash scripts/local-test.sh (handles env setup automatically)
#
# Manual usage with env vars:
#   export CLAW_TEST_DATA_DIR=/tmp/claw-local-test/data
#   export CLAW_AUTH_PROFILES_HOST=/tmp/claw-local-test/auth/auth-profiles.json
#   export CLAW_CREDS_HOST=/tmp/claw-local-test/auth/.credentials.json
#   export CLAW_TEMPLATES_DIR_HOST=$(pwd)/templates
#   export CLAW_CP_HOST_PORT=13200
#   export CLAW_RELAY_HOST_PORT=13101
#   export CLAW_COMPOSE_ENV_FILE=/tmp/claw-local-test/env
#   docker compose -f docker/docker-compose.test.yml --env-file /tmp/claw-local-test/env up --build
#
# IMPORTANT — Port coexistence:
#   Host ports default to 13200 (CP) and 13101 (relay) so this stack can run
#   alongside production systemd claw-* services bound to 3200/3101.
#   Never bind 3200/3101 in this file.
#
# IMPORTANT — Data isolation:
#   CLAW_TEST_DATA_DIR defaults to /tmp/claw-local-test/data (not /data/tenants).
#   Production tenant data at /data/tenants is never touched by this stack.
#
# Env vars recognised by this file:
#   CLAW_AUTH_PROFILES_HOST   host path for auth-profiles.json (default: $HOME/.openclaw/...)
#   CLAW_CREDS_HOST           host path for .credentials.json  (default: $HOME/.claude/...)
#   CLAW_TEMPLATES_DIR_HOST   host path for workspace templates (default: ../templates)
#   CLAW_TEST_DATA_DIR        host data dir (default: /tmp/claw-local-test/data)
#   CLAW_CP_HOST_PORT         host port for control-plane      (default: 13200)
#   CLAW_RELAY_HOST_PORT      host port for slack-relay        (default: 13101)
#   CLAW_COMPOSE_ENV_FILE     env file path for service env_file directive
#
# Tear down: docker compose -f docker/docker-compose.test.yml down -v
# ─────────────────────────────────────────────────────────────────────────────

name: claw-orchestrator-test

services:

  # ── Control Plane ────────────────────────────────────────────────────────────
  control-plane:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: control-plane
    image: claw-control-plane:test
    container_name: claw-cp-test
    ports:
      - "${CLAW_CP_HOST_PORT:-13200}:3200"
    environment:
      - DATABASE_URL=file:/data/tenants/orchestrator.db
      - DATA_DIR=/data/tenants
      - HOST_DATA_DIR=${CLAW_TEST_DATA_DIR:-/tmp/claw-local-test/data}
      # CONTAINER_NETWORK: Docker network tenant containers join (must match this compose network)
      - CONTAINER_NETWORK=claw-orchestrator-test_default # Network name = compose project name + "_default". Verify: docker network inspect claw-orchestrator-test_default
      - CONTROL_PLANE_PORT=3200
      - LOG_LEVEL=info
      - NODE_ENV=production
    env_file:
      - ${CLAW_COMPOSE_ENV_FILE:-../.env}
    volumes:
      # Bind-mount for tenant data
      - ${CLAW_TEST_DATA_DIR:-/tmp/claw-local-test/data}:/data/tenants
      # Bind-mount Docker socket so control-plane can manage tenant containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Auth files for tenant provisioning (read-only)
      - ${CLAW_AUTH_PROFILES_HOST:-${HOME}/.openclaw/agents/main/agent/auth-profiles.json}:/root/.openclaw/agents/main/agent/auth-profiles.json:ro
      - ${CLAW_CREDS_HOST:-${HOME}/.claude/.credentials.json}:/root/.claude/.credentials.json:ro
      # Workspace templates (read-only)
      - ${CLAW_TEMPLATES_DIR_HOST:-../templates}:/opt/claw-orchestrator/templates:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Slack Relay ──────────────────────────────────────────────────────────────
  slack-relay:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: slack-relay
    image: claw-slack-relay:test
    container_name: claw-relay-test
    ports:
      - "${CLAW_RELAY_HOST_PORT:-13101}:3101"
    environment:
      - SLACK_RELAY_PORT=3101
      - CONTROL_PLANE_URL=http://control-plane:3200
      - LOG_LEVEL=info
      - NODE_ENV=production
    env_file:
      - ${CLAW_COMPOSE_ENV_FILE:-../.env}
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3101/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Scheduler ────────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: scheduler
    image: claw-scheduler:test
    container_name: claw-scheduler-test
    environment:
      - DATABASE_URL=file:/data/tenants/orchestrator.db
      - DATA_DIR=/data/tenants
      - CONTROL_PLANE_URL=http://control-plane:3200
      - LOG_LEVEL=info
      - NODE_ENV=production
    env_file:
      - ${CLAW_COMPOSE_ENV_FILE:-../.env}
    volumes:
      - ${CLAW_TEST_DATA_DIR:-/tmp/claw-local-test/data}:/data/tenants
    depends_on:
      control-plane:
        condition: service_healthy
    restart: unless-stopped
